name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            2>&1 | grep -v "^\[=" || true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/动车组机械师-v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 动车组机械师-APK
          path: app/build/outputs/apk/debug/动车组机械师-v1.0.apk
          if-no-files-found: error
